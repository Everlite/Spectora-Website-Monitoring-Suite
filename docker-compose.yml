services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: spectora-app:latest
    container_name: spectora-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - spectora-db:/var/www/html/database
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  spectora-db:
